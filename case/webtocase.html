<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report an Issue - Web to Case</title>
    
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Open Sans', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #448ee1, #9013FE); /* dark neutral background */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px 0;
    }

    .company-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      width: 80px;
      height: auto;
      margin-bottom: 10px;
    }

    .company-name {
      color: #ffffff;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .container {
      background: linear-gradient(135deg, #448ee1, #9013FE);
      padding: 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      color: #fff;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
      color: #f1f5f9;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-top: 6px;
      font-size: 14px;
      color: #000;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .grid-row {
      display: flex;
      gap: 12px;
    }

    .grid-row .form-group {
      flex: 1;
    }

    .btn-submit {
      width: 100%;
      background: #ba08f0;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }

    .btn-submit:hover {
      opacity: 0.9;
    }

    .button-container {
      margin-top: 2rem;
      text-align: center;
    }

    button {
      background: linear-gradient(135deg, #448ee1, #074ae8);
      color: white;
      font-size: 1rem;
      padding: 0.8rem 1.5rem;
      margin: 0.5rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #005bb5;
    }

    .company-footer {
      text-align: center;
      color: #94a3b8;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header class="company-header">
    <img src="../images/logo.png" alt="Company Logo" class="logo">
    <h1 class="company-name">SolarPulse Energy</h1>
  </header>

  <div class="container">
    <h2>Report an Issue</h2>
    <form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00Dd200000CP1LP" method="POST">

      <!-- Hidden Salesforce Web-to-Case Parameters -->
      <input type="hidden" name="orgid" value="00Dd200000CP1LP">
      <input type="hidden" name="retURL" value="https://hemasundar784.github.io/Solarpulse-website/">
      <input type="hidden" id="external" name="external" value="1">

      <!-- Optional Debugging Elements (Uncomment if needed)
      <input type="hidden" name="debug" value="1">
      <input type="hidden" name="debugEmail" value="hemsun18@yahoo.com">
      -->

      <div class="form-group">
        <label for="name">Contact Name</label>
        <input id="name" maxlength="80" name="name" type="text" placeholder="John Doe" required>
      </div>

      <div class="grid-row">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" maxlength="80" name="email" type="email" placeholder="john.doe@example.com" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input id="phone" maxlength="40" name="phone" type="text" placeholder="(123) 456-7890">
        </div>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input id="subject" maxlength="80" name="subject" type="text" placeholder="Brief description of the issue" required>
      </div>

      <div class="form-group">
        <label for="00Nd200000dgpIB">Product</label>
        <select id="00Nd200000dgpIB" name="00Nd200000dgpIB" title="Product">
          <option value="">--None--</option>
          <option value="15kw">SP-ULTRA-15K</option>
          <option value="spprem">SP-PREM-10K</option>
          <option value="sppro">SP-PRO-7K</option>
          <option value="sobasic">SP-BASIC-3K</option>
          <option value="spstand">SP-STANDARD-5K</option>
          <option value="spultra">SP-ULTRA-15K</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Please provide details about the issue..."></textarea>
      </div>

      <input type="submit" name="submit" value="Submit Case" class="btn-submit">

      <div class="button-container">
        <button type="button" onclick="openProducts()">Products</button>
        <button type="button" onclick="openEstimation()">Estimation Cost</button>
        <button type="button" onclick="openHome()">Home</button>
      </div>
    </form>
  </div>

  <footer class="company-footer">
    <h3>Solar Network Highlights</h3>
    <p>Active Regions: Telangana, Andhra Pradesh, Karnataka</p>
    <p>Total Installed Capacity: Over 15+ MW across residential & commercial</p>
    <p>Subsidy Assistance: Fully integrated central & state approvals</p>
  </footer>

<script>
  function openProducts() {
    window.location.href = "../products/SolarProducts.html";
  }

  function openHome() {
    window.location.href = "../index.html";
  }

  function openEstimation() {
    window.location.href = "../estimator/estimator.html";
  }
</script>
</body>
</html>
