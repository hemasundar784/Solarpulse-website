<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
    
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Open Sans', sans-serif;
    }

    body {
      background: #0f172a; /* dark neutral background */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .company-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      width: 80px;
      height: auto;
      margin-bottom: 10px;
    }

    .company-name {
      color: #ffffff;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .container {
      background: linear-gradient(135deg, #448ee1, #9013FE);
      padding: 20px;              /* reduced padding */
      border-radius: 12px;
      width: 100%;
      max-width: 600px;           /* reduced width */
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      color: #fff;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
      color: #f1f5f9;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-top: 6px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    .grid-row {
      display: flex;
      gap: 12px;
    }

    .grid-row .form-group {
      flex: 1;
    }

    .coord-wrapper {
      display: flex;
      gap: 8px;
    }

    .btn-geo {
      background: #0070d2;
      border-radius: 6px;
      padding: 0 14px;
      cursor: pointer;
      font-size: 16px;
      color: #fff;
      border: none;
    }

    .btn-submit {
      width: 100%;
      background: #ba08f0;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }

    .btn-submit:hover {
      opacity: 0.9;
    }

    .button-container {
      margin-top: 2rem;
      text-align: center;
    }

    button {
      background: #0070d2;
      color: white;
      font-size: 1rem;
      padding: 0.8rem 1.5rem;
      margin: 0.5rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #005bb5;
    }

    .company-footer {
      text-align: center;
      color: #94a3b8;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header class="company-header">
    <img src="company-logo.png" alt="Company Logo" class="logo">
    <h1 class="company-name">SolarPulse Energy</h1>
  </header>

  <div class="container">
    <h2>Register</h2>
    <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00Dd200000CP1LP" method="POST">
      <input type="hidden" name="oid" value="00Dd200000CP1LP">
      <input type="hidden" name="retURL" value="estimator.html">
      <input type="hidden" id="lead_source" name="lead_source" value="Web">

      <div class="grid-row">
        <div class="form-group">
          <label for="first_name">First Name</label>
          <input id="first_name" name="first_name" type="text" placeholder="John">
        </div>
        <div class="form-group">
          <label for="last_name">Last Name</label>
          <input id="last_name" name="last_name" type="text" placeholder="Doe" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="text" placeholder="john.doe@example.com">
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="text" placeholder="(123) 456-7890">
      </div>

      <div class="form-group">
        <label for="company">Company Name</label>
        <input id="company" name="company" type="text" placeholder="SolarPulse Energy" required>
      </div>

      <div class="grid-row">
        <div class="form-group">
          <label for="city">City</label>
          <input id="city" name="city" type="text">
        </div>
        <div class="form-group">
          <label for="state">State/Province</label>
          <input id="state" name="state" type="text">
        </div>
      </div>

      <div class="form-group">
        <label>Coordinates</label>
        <div class="coord-wrapper">
          <input id="latitudeBottom" name="0BCd2000000Suld" type="text" placeholder="Latitude">
          <input id="longitudeBottom" name="0BCd2000000Sule" type="text" placeholder="Longitude">
          <button type="button" class="btn-geo" onclick="getLocation()">📍</button>
        </div>
      </div>

      <div class="form-group">
        <label for="street">Street</label>
        <textarea id="street" name="street"></textarea>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description"></textarea>
      </div>

      <input type="submit" value="Submit Registration" class="btn-submit">

      <div class="button-container">
        <button type="button" onclick="openProducts()">Products</button>
        <button type="button" onclick="openEstimation()">Estimation Cost</button>
        <button type="button" onclick="openCreateCase()">Report an Issue (Case)</button>
      </div>
    </form>
  </div>

  <footer class="company-footer">
    <h3>Service Network Highlights</h3>
    <p>Active Regions: Telangana, Andhra Pradesh, Karnataka</p>
    <p>Total Installed Capacity: Over 15+ MW across residential & commercial</p>
    <p>Subsidy Assistance: Fully integrated central & state approvals</p>
  </footer>

<script>
  function getLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(position) {
        document.getElementById('latitudeBottom').value = position.coords.latitude;
        document.getElementById('longitudeBottom').value = position.coords.longitude;
      }, function() {
        alert("Unable to retrieve location.");
      });
    } else {
      alert("Geolocation is not supported by this browser.");
    }
  }

  function openProducts() {
    window.location.href = "products.html";
  }

  function openCreateCase() {
    window.location.href = "create-case.html";
  }

  function openEstimation() {
    window.location.href = "estimator.html";
  }
</script>
</body>
</html>
